---
apiVersion: v1
kind: ConfigMap
metadata:
  name: diracx-cms-init-keystore
  namespace: default
  labels:
    app.kubernetes.io/name: diracx
    app.kubernetes.io/component: init-keystore
data:
  # The first script: creates the cryptographic keys
  init-keystore: |
    #!/usr/bin/env bash
    set -euo pipefail

    source /activate.sh

    mkdir -p /keystore
    KEYSTORE_PATH=/keystore/jwks.json

    if [[ -f $KEYSTORE_PATH ]]; then
        echo "JWKS already exists, this is not supported!"
        exit 1
    fi

    python -m diracx.logic rotate-jwk --jwks-path $KEYSTORE_PATH
    
  # The second script: uploads them as a K8s secret
  load-keystore-as-secret: |
    #!/usr/bin/env bash
    set -euo pipefail

    source /activate.sh

    KEYSTORE_PATH=/keystore/jwks.json

    if [[ ! -f $KEYSTORE_PATH ]]; then
      echo "Keystore is missing"
      exit 1;
    fi

    # Check if the keystore secret already exists
    if kubectl get secret diracx-jwks >/dev/null 2>&1; then
      echo "diracx-jwks already present, skipping keystore generation"
      exit 0
    fi

    # Create the keystore secret
    kubectl create secret generic diracx-jwks --from-file=$KEYSTORE_PATH

---
apiVersion: batch/v1
kind: Job
metadata:
  name: diracx-cms-init-keystore
  namespace: default
spec:
  activeDeadlineSeconds: 900
  backoffLimit: 6
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      # Critical: This SA must have 'create' and 'patch' permissions for Secrets
      serviceAccountName: diracx-cms-init-secrets
      
      initContainers:
        - name: diracx-init-keystore
          image: ghcr.io/diracgrid/diracx/services:v0.0.13
          imagePullPolicy: Always
          command: ["/bin/bash", "/entrypoint.sh"]
          args: ["/bin/bash", "/scripts/init-keystore"]
          volumeMounts:
            - name: container-entrypoint
              mountPath: /entrypoint.sh
              subPath: entrypoint.sh
            - name: scripts
              mountPath: /scripts
            - name: keystore
              mountPath: /keystore

      containers:
        - name: diracx-load-keystore-as-secret
          image: ghcr.io/diracgrid/diracx/secret-generation:latest
          imagePullPolicy: Always
          # Note: The Helm chart uses 'args' here, usually the image has a default entrypoint
          args: ["/bin/bash", "/scripts/load-keystore-as-secret"]
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: keystore
              mountPath: /keystore

      volumes:
        - name: keystore
          emptyDir: {}
        - name: scripts
          configMap:
            name: diracx-cms-init-keystore
            defaultMode: 0755
        - name: container-entrypoint
          configMap:
            name: diracx-container-entrypoint
            defaultMode: 0755
