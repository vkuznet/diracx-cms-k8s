---
apiVersion: v1
kind: ConfigMap
metadata:
  name: diracx-cms-init-keystore
  namespace: default
  labels:
    app.kubernetes.io/name: diracx
    app.kubernetes.io/component: init-keystore
data:
  # The first script: creates the cryptographic keys
  init-keystore: |
    #!/usr/bin/env bash
    set -euo pipefail
    python -m diracx.db init-keystore
    
  # The second script: uploads them as a K8s secret
  load-keystore-as-secret: |
    #!/usr/bin/env bash
    set -euo pipefail
    # This assumes the secret-generation image has logic 
    # to create a secret from the files in /keystore
    diracx-generate-secret from-keystore /keystore

---
apiVersion: batch/v1
kind: Job
metadata:
  name: diracx-cms-init-keystore
  namespace: default
spec:
  activeDeadlineSeconds: 900
  backoffLimit: 6
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      # Critical: This SA must have 'create' and 'patch' permissions for Secrets
      serviceAccountName: diracx-cms-init-secrets
      
      initContainers:
        - name: diracx-init-keystore
          image: ghcr.io/diracgrid/diracx/services:v0.0.13
          imagePullPolicy: Always
          command: ["/bin/bash", "/entrypoint.sh"]
          args: ["/bin/bash", "/scripts/init-keystore"]
          volumeMounts:
            - name: container-entrypoint
              mountPath: /entrypoint.sh
              subPath: entrypoint.sh
            - name: scripts
              mountPath: /scripts
            - name: keystore
              mountPath: /keystore

      containers:
        - name: diracx-load-keystore-as-secret
          image: ghcr.io/diracgrid/diracx/secret-generation:latest
          imagePullPolicy: Always
          # Note: The Helm chart uses 'args' here, usually the image has a default entrypoint
          args: ["/bin/bash", "/scripts/load-keystore-as-secret"]
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: keystore
              mountPath: /keystore

      volumes:
        - name: keystore
          emptyDir: {}
        - name: scripts
          configMap:
            name: diracx-cms-init-keystore
            defaultMode: 0755
        - name: container-entrypoint
          configMap:
            name: diracx-container-entrypoint
            defaultMode: 0755
