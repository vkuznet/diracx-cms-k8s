apiVersion: batch/v1
kind: Job
metadata:
  name: diracx-cms-init-keystore
  namespace: default
spec:
  activeDeadlineSeconds: 900
  backoffLimit: 6
  completionMode: NonIndexed
  completions: 1
  manualSelector: false
  parallelism: 1
  podReplacementPolicy: TerminatingOrFailed
  suspend: false
  template:
    metadata:
      labels: {}
    spec:
      containers:
      - args:
        - /bin/bash
        - /scripts/load-keystore-as-secret
        image: ghcr.io/diracgrid/diracx/secret-generation:latest
        imagePullPolicy: Always
        name: diracx-load-keystore-as-secret
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /scripts
          name: scripts
        - mountPath: /keystore
          name: keystore
      dnsPolicy: ClusterFirst
      initContainers:
      - args:
        - /bin/bash
        - /scripts/init-keystore
        command:
        - /bin/bash
        - /entrypoint.sh
        image: ghcr.io/diracgrid/diracx/services:v0.0.13
        imagePullPolicy: Always
        name: diracx-init-keystore
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /entrypoint.sh
          name: container-entrypoint
          subPath: entrypoint.sh
        - mountPath: /scripts
          name: scripts
        - mountPath: /keystore
          name: keystore
      restartPolicy: Never
      schedulerName: default-scheduler
      securityContext: {}
      serviceAccount: diracx-cms-init-secrets
      serviceAccountName: diracx-cms-init-secrets
      terminationGracePeriodSeconds: 30
      volumes:
      - emptyDir: {}
        name: keystore
      - configMap:
          defaultMode: 420
          name: diracx-cms-init-keystore
        name: scripts
      - configMap:
          defaultMode: 420
          name: diracx-container-entrypoint
        name: container-entrypoint
  ttlSecondsAfterFinished: 3600
