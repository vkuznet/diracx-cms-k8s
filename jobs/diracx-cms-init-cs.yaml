---
apiVersion: v1
kind: ConfigMap
metadata:
  name: diracx-cms-init-cs
  namespace: default
data:
  init-cs: |
    #!/usr/bin/env bash
    set -euo pipefail

    # 1. Activate the environment
    source /activate.sh

    # 2. Initialize the Configuration Service
    # Based on your 'dirac --help' output, we use the config command.
    # We point it to the mounted PVC path.
    echo "Initializing Configuration Service in /cs_store..."
    
    # Typically, DiracX expects a local git-based CS or a specific structure.
    # If this command differs in your docs, swap it here:
    # dirac config init --path /cs_store
    dirac internal generate-cs /cs_store/initialRepo
    
    echo "CS initialization complete."

---
apiVersion: batch/v1
kind: Job
metadata:
  name: diracx-cms-init-cs
  namespace: default
spec:
  ttlSecondsAfterFinished: 3600
  activeDeadlineSeconds: 900
  backoffLimit: 6
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: diracx
          image: ghcr.io/diracgrid/diracx/client:v0.0.13
          imagePullPolicy: Always
          command: ["/bin/bash", "/entrypoint.sh"]
          args: ["/bin/bash", "/scripts/init-cs"]
          volumeMounts:
            - name: cs-store-mount
              mountPath: /cs_store
            - name: container-entrypoint
              mountPath: /entrypoint.sh
              subPath: entrypoint.sh
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: diracx-cms-init-cs
            defaultMode: 0755 # Changed to 755 to ensure it is executable
        - name: cs-store-mount
          persistentVolumeClaim:
            claimName: pvc-cs-store
        - name: container-entrypoint
          configMap:
            name: diracx-container-entrypoint
            defaultMode: 0755
