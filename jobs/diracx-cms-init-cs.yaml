apiVersion: batch/v1
kind: Job
metadata:
  labels: {}
  name: diracx-cms-init-cs
  namespace: default
spec:
  activeDeadlineSeconds: 900
  backoffLimit: 6
  completionMode: NonIndexed
  completions: 1
  manualSelector: false
  parallelism: 1
  podReplacementPolicy: TerminatingOrFailed
  selector:
    matchLabels:
      batch.kubernetes.io/controller-uid: 9e273bff-0581-47ab-9e4a-bff1e8fceb8f
  suspend: false
  template:
    metadata:
      labels:
        batch.kubernetes.io/controller-uid: 9e273bff-0581-47ab-9e4a-bff1e8fceb8f
        batch.kubernetes.io/job-name: diracx-cms-init-cs-1-s9i
        controller-uid: 9e273bff-0581-47ab-9e4a-bff1e8fceb8f
        job-name: diracx-cms-init-cs-1-s9i
    spec:
      containers:
      - args:
        - /bin/bash
        - /scripts/init-cs
        command:
        - /bin/bash
        - /entrypoint.sh
        image: ghcr.io/diracgrid/diracx/client:v0.0.13
        imagePullPolicy: Always
        name: diracx
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /cs_store
          name: cs-store-mount
        - mountPath: /entrypoint.sh
          name: container-entrypoint
          subPath: entrypoint.sh
        - mountPath: /diracx_source
          name: diracx-code-mount
          readOnly: true
        - mountPath: /diracx_source/diracx/diracx-api/src/diracx_api.egg-info
          name: diracx-api-editable-install
        - mountPath: /diracx_source/diracx/diracx-tasks/src/diracx_tasks.egg-info
          name: diracx-tasks-editable-install
        - mountPath: /diracx_source/diracx/diracx-client/src/diracx_client.egg-info
          name: diracx-client-editable-install
        - mountPath: /diracx_source/diracx/diracx-db/src/diracx_db.egg-info
          name: diracx-db-editable-install
        - mountPath: /diracx_source/diracx/diracx-testing/src/diracx_testing.egg-info
          name: diracx-testing-editable-install
        - mountPath: /diracx_source/diracx/diracx-logic/src/diracx_logic.egg-info
          name: diracx-logic-editable-install
        - mountPath: /diracx_source/diracx/diracx-core/src/diracx_core.egg-info
          name: diracx-core-editable-install
        - mountPath: /diracx_source/diracx/diracx-cli/src/diracx_cli.egg-info
          name: diracx-cli-editable-install
        - mountPath: /diracx_source/diracx/diracx-routers/src/diracx_routers.egg-info
          name: diracx-routers-editable-install
        - mountPath: /scripts
          name: scripts
      dnsPolicy: ClusterFirst
      restartPolicy: Never
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - configMap:
          defaultMode: 420
          name: diracx-cms-init-cs
        name: scripts
      - name: cs-store-mount
        persistentVolumeClaim:
          claimName: pvc-cs-store
      - name: diracx-code-mount
        persistentVolumeClaim:
          claimName: pvc-diracx-code
      - emptyDir:
          sizeLimit: 5Mi
        name: diracx-api-editable-install
      - emptyDir:
          sizeLimit: 5Mi
        name: diracx-tasks-editable-install
      - emptyDir:
          sizeLimit: 5Mi
        name: diracx-client-editable-install
      - emptyDir:
          sizeLimit: 5Mi
        name: diracx-db-editable-install
      - emptyDir:
          sizeLimit: 5Mi
        name: diracx-testing-editable-install
      - emptyDir:
          sizeLimit: 5Mi
        name: diracx-logic-editable-install
      - emptyDir:
          sizeLimit: 5Mi
        name: diracx-core-editable-install
      - emptyDir:
          sizeLimit: 5Mi
        name: diracx-cli-editable-install
      - emptyDir:
          sizeLimit: 5Mi
        name: diracx-routers-editable-install
      - configMap:
          defaultMode: 420
          name: diracx-container-entrypoint
        name: container-entrypoint
  ttlSecondsAfterFinished: 3600
