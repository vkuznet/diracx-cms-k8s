apiVersion: batch/v1
kind: Job
metadata:
  labels:
    app.kubernetes.io/managed-by: Helm
  name: diracx-cms-issuer-1
  namespace: default
spec:
  activeDeadlineSeconds: 300
  backoffLimit: 6
  # Remove manualSelector: false (default is true for Jobs, let K8s handle it)
  # Remove the 'selector' block entirely
  template:
    metadata:
      labels:
        app: cert-manager-issuer
        release: diracx-cms
        # Remove batch.kubernetes.io/controller-uid
        # Remove controller-uid
        # Remove job-name (K8s adds this automatically)
    spec:
      containers:
      - command:
        - /bin/bash
        - /scripts/create-issuer
        - /scripts/issuer.yml
        image: ghcr.io/diracgrid/diracx/secret-generation:latest
        imagePullPolicy: Always
        name: create-issuer
        resources:
          requests:
            cpu: 50m
        volumeMounts:
        - mountPath: /scripts
          name: scripts
      dnsPolicy: ClusterFirst
      restartPolicy: OnFailure
      serviceAccountName: diracx-cms-cert-manager-issuer
      volumes:
      - configMap:
          defaultMode: 420
          name: diracx-cms-cert-manager-issuer-certmanager
        name: scripts
  ttlSecondsAfterFinished: 3600
