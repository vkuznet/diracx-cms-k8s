---
# ConfigMap: holds the init-sql script mounted into the Job pod.
# The script itself is trivial – it delegates entirely to the diracx Python
# package which reads the DB URLs from the environment (injected as secrets).
apiVersion: v1
kind: ConfigMap
metadata:
  name: diracx-cms-init-sql
  namespace: default
  labels:
    app.kubernetes.io/name: diracx
    app.kubernetes.io/component: init-sql
data:
  init-sql: |
    #!/usr/bin/env bash
    set -euo pipefail
    python -m diracx.db init-sql

---
# Job: initialises all DiracX SQL databases (creates tables / runs migrations).
#
# Prerequisites:
#   - MySQL StatefulSet is running and healthy
#   - Secret diracx-sql-root-connection-urls exists with one key per DB
#     (populated by the diracx-cms-init-secrets job)
#   - ConfigMap diracx-container-entrypoint exists (carries entrypoint.sh)
#
# To re-run:
#   kubectl delete job diracx-cms-init-sql -n default
#   kubectl apply -f diracx-cms-init-sql.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: diracx-cms-init-sql
  namespace: default
  labels:
    app.kubernetes.io/name: diracx
    app.kubernetes.io/component: init-sql
spec:
  activeDeadlineSeconds: 900
  backoffLimit: 6
  completions: 1
  parallelism: 1
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: diracx
        app.kubernetes.io/component: init-sql
    spec:
      restartPolicy: Never
      terminationGracePeriodSeconds: 30

      # Wait for MySQL to be reachable before the main container starts.
      initContainers:
        - name: wait-for-mysql
          image: docker.io/library/busybox:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until nc -z diracx-cms-mysql 3306; do
                echo "Waiting for MySQL..."; sleep 3
              done

      containers:
        - name: diracx
          image: ghcr.io/diracgrid/diracx/services:v0.0.13
          imagePullPolicy: Always
          # entrypoint.sh sets up the Python environment, then exec's its args
          command: ["/bin/bash", "/entrypoint.sh"]
          args:   ["/bin/bash", "/scripts/init-sql"]

          # One env var per DB – all pulled from the root-connection-urls secret
          # so the init job has DDL privileges (CREATE TABLE, ALTER, etc.)
          env:
            - name: DIRACX_DB_URL_AUTHDB
              valueFrom:
                secretKeyRef:
                  name: diracx-sql-root-connection-urls
                  key: DIRACX_DB_URL_AUTHDB
            - name: DIRACX_DB_URL_JOBDB
              valueFrom:
                secretKeyRef:
                  name: diracx-sql-root-connection-urls
                  key: DIRACX_DB_URL_JOBDB
            - name: DIRACX_DB_URL_JOBLOGGINGDB
              valueFrom:
                secretKeyRef:
                  name: diracx-sql-root-connection-urls
                  key: DIRACX_DB_URL_JOBLOGGINGDB
            - name: DIRACX_DB_URL_PILOTAGENTSDB
              valueFrom:
                secretKeyRef:
                  name: diracx-sql-root-connection-urls
                  key: DIRACX_DB_URL_PILOTAGENTSDB
            - name: DIRACX_DB_URL_SANDBOXMETADATADB
              valueFrom:
                secretKeyRef:
                  name: diracx-sql-root-connection-urls
                  key: DIRACX_DB_URL_SANDBOXMETADATADB
            - name: DIRACX_DB_URL_TASKQUEUEDB
              valueFrom:
                secretKeyRef:
                  name: diracx-sql-root-connection-urls
                  key: DIRACX_DB_URL_TASKQUEUEDB

          resources: {}

          volumeMounts:
            # entrypoint.sh from the shared ConfigMap
            - name: container-entrypoint
              mountPath: /entrypoint.sh
              subPath: entrypoint.sh
            # The init-sql script defined in the ConfigMap above
            - name: scripts
              mountPath: /scripts

      volumes:
        - name: scripts
          configMap:
            name: diracx-cms-init-sql
            defaultMode: 0755
        - name: container-entrypoint
          configMap:
            name: diracx-container-entrypoint
            defaultMode: 0755
