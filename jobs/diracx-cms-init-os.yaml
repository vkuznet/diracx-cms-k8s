apiVersion: batch/v1
kind: Job
metadata:
  name: diracx-cms-init-os
  namespace: default
spec:
  activeDeadlineSeconds: 900
  backoffLimit: 6
  completionMode: NonIndexed
  completions: 1
  manualSelector: false
  parallelism: 1
  podReplacementPolicy: TerminatingOrFailed
  suspend: false
  template:
    metadata:
      labels: {}
    spec:
      containers:
      - args:
        - /bin/bash
        - /scripts/init-os
        command:
        - /bin/bash
        - /entrypoint.sh
        env:
        - name: DIRACX_OS_DB_JOBPARAMETERSDB
          valueFrom:
            secretKeyRef:
              key: DIRACX_OS_DB_JOBPARAMETERSDB
              name: diracx-os-root-connection-urls
        - name: DIRACX_OS_DB_PILOTLOGSDB
          valueFrom:
            secretKeyRef:
              key: DIRACX_OS_DB_PILOTLOGSDB
              name: diracx-os-root-connection-urls
        image: ghcr.io/diracgrid/diracx/services:v0.0.13
        imagePullPolicy: Always
        name: diracx
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /entrypoint.sh
          name: container-entrypoint
          subPath: entrypoint.sh
        - mountPath: /scripts
          name: scripts
      dnsPolicy: ClusterFirst
      initContainers:
      - command:
        - sh
        - -c
        - until nc -z  opensearch-cluster-master 9200; do echo "Waiting for opensearch...";
          sleep 3; done;
        image: docker.io/library/busybox:latest
        imagePullPolicy: IfNotPresent
        name: wait-for-opensearch
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts: []
      restartPolicy: Never
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - configMap:
          defaultMode: 420
          name: diracx-cms-init-os
        name: scripts
      - configMap:
          defaultMode: 420
          name: diracx-container-entrypoint
        name: container-entrypoint
  ttlSecondsAfterFinished: 3600
