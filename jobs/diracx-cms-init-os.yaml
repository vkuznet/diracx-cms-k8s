---
apiVersion: v1
kind: ConfigMap
metadata:
  name: diracx-cms-init-os
  namespace: default
data:
  init-os: |
    #!/usr/bin/env bash
    set -euo pipefail
    # This script initializes the OpenSearch indices for DiracX
    python -m diracx.db init-os

---
apiVersion: batch/v1
kind: Job
metadata:
  name: diracx-cms-init-os
  namespace: default
spec:
  activeDeadlineSeconds: 900
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-opensearch
          image: docker.io/library/busybox:latest
          # Using -z here since we confirmed it works in your environment
          command: ["sh", "-c", "until nc -z opensearch-cluster-master 9200; do echo 'Waiting for OpenSearch...'; sleep 3; done;"]
      containers:
        - name: diracx
          image: ghcr.io/diracgrid/diracx/services:v0.0.13
          command: ["/bin/bash", "/entrypoint.sh"]
          args: ["/bin/bash", "/scripts/init-os"]
          env:
            # These must match the keys expected by the diracx.db module
            - name: DIRACX_OS_DB_JOBPARAMETERSDB
              valueFrom:
                secretKeyRef:
                  name: diracx-os-root-connection-urls
                  key: DIRACX_OS_DB_JOBPARAMETERSDB
            - name: DIRACX_OS_DB_PILOTLOGSDB
              valueFrom:
                secretKeyRef:
                  name: diracx-os-root-connection-urls
                  key: DIRACX_OS_DB_PILOTLOGSDB
          volumeMounts:
            - name: container-entrypoint
              mountPath: /entrypoint.sh
              subPath: entrypoint.sh
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: diracx-cms-init-os
            defaultMode: 0755
        - name: container-entrypoint
          configMap:
            name: diracx-container-entrypoint
            defaultMode: 0755
