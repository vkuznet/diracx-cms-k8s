---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: diracx-cert-manager-controller-cluster
rules:
  # 1. Essential K8s Core
  - apiGroups: [""]
    resources: ["secrets", "services", "events", "endpoints", "pods", "namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # 2. Cert-Manager Resources (Crucial for the "not found" error)
  - apiGroups: ["cert-manager.io"]
    resources: 
      - "certificates"
      - "certificates/status"
      - "certificates/finalizers"
      - "certificaterequests"
      - "certificaterequests/status"
      - "certificaterequests/finalizers"
      - "issuers"
      - "issuers/status"
      - "clusterissuers"
      - "clusterissuers/status"
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # 3. Approval Permissions (The "READY" column fix)
  - apiGroups: ["cert-manager.io"]
    resources: ["certificaterequests/approval"]
    verbs: ["update"]
  - apiGroups: ["cert-manager.io"]
    resources: ["signers"]
    verbs: ["approve"]

  # 4. Networking & ACME
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "ingressclasses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["acme.cert-manager.io"]
    resources: ["challenges", "challenges/status", "orders", "orders/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: diracx-cert-manager-controller-cluster
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: diracx-cert-manager-controller-cluster
subjects:
  - kind: ServiceAccount
    name: diracx-cms-cert-manager
    namespace: default
