---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: diracx-cert-manager-cainjector-cluster
rules:
  # cainjector needs to read CRDs to know where to inject certificates
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  # It also needs to modify Webhook configurations
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["mutatingwebhookconfigurations", "validatingwebhookconfigurations"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # It needs to watch secrets and certificates to get the CA data
  - apiGroups: [""]
    resources: ["secrets", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: diracx-cert-manager-cainjector-cluster
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: diracx-cert-manager-cainjector-cluster
subjects:
  - kind: ServiceAccount
    name: diracx-cms-cert-manager-cainjector # Matches the user in your error log
    namespace: default
