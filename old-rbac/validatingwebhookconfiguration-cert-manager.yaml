apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: diracx-cms-cert-manager-webhook
  labels:
    app: webhook
    app.kubernetes.io/component: webhook
    app.kubernetes.io/instance: diracx-cms
    app.kubernetes.io/name: webhook
    app.kubernetes.io/version: v1.13.1
  annotations:
    cert-manager.io/inject-ca-from-secret: default/diracx-cms-cert-manager-webhook-ca
webhooks:
- name: webhook.cert-manager.io
  admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: diracx-cms-cert-manager-webhook
      namespace: default
      path: /validate
      port: 443
  failurePolicy: Ignore
  matchPolicy: Equivalent
  namespaceSelector:
    matchExpressions:
    - key: cert-manager.io/disable-validation
      operator: NotIn
      values:
      - 'true'
    - key: kubernetes.io/metadata.name
      operator: NotIn
      values:
      - kube-system
  rules:
  - apiGroups:
    - cert-manager.io
    - acme.cert-manager.io
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - '*/*'
  sideEffects: None
  timeoutSeconds: 30
