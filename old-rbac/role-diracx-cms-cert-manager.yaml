---
# ClusterRole: full permissions for the cert-manager controller
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: diracx-cert-manager-controller-cluster
rules:
  # Core resources (added configmaps for leader election)
  - apiGroups: [""]
    resources: ["secrets", "services", "events", "endpoints", "pods",
                "namespaces", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # All cert-manager resources including issuers/finalizers
  # FIX: issuers/finalizers was missing — caused "issuer not found" re-queue loop
  - apiGroups: ["cert-manager.io"]
    resources:
      - "certificates"
      - "certificates/status"
      - "certificates/finalizers"
      - "certificaterequests"
      - "certificaterequests/status"
      - "certificaterequests/finalizers"
      - "issuers"
      - "issuers/status"
      - "issuers/finalizers"
      - "clusterissuers"
      - "clusterissuers/status"
      - "clusterissuers/finalizers"
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # CertificateRequest approval
  - apiGroups: ["cert-manager.io"]
    resources: ["certificaterequests/approval"]
    verbs: ["update"]
  - apiGroups: ["cert-manager.io"]
    resources: ["signers"]
    verbs: ["approve"]
  # Networking (HTTP-01 solver)
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "ingressclasses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # ACME challenges and orders
  - apiGroups: ["acme.cert-manager.io"]
    resources: ["challenges", "challenges/status", "challenges/finalizers",
                "orders", "orders/status", "orders/finalizers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Leader election leases (cluster-wide)
  # FIX: was missing entirely
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Webhook config management (cert-manager injects its own CA bundle)
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["validatingwebhookconfigurations", "mutatingwebhookconfigurations"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # CRD status updates (for CA injection into CRD conversion webhooks)
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch", "update", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: diracx-cert-manager-controller-cluster
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: diracx-cert-manager-controller-cluster
subjects:
  - kind: ServiceAccount
    name: diracx-cms-cert-manager
    namespace: default

---
# Role in kube-system for leader election lock
# cert-manager always uses kube-system for this, regardless of its own namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cert-manager-leader-election
  namespace: kube-system
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch", "update"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cert-manager-leader-election
  namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cert-manager-leader-election
subjects:
  - kind: ServiceAccount
    name: diracx-cms-cert-manager
    namespace: default
