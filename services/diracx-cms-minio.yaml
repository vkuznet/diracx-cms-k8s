apiVersion: v1
kind: Service
metadata:
  labels:
    app: minio
    app.kubernetes.io/managed-by: Helm
    chart: minio-5.0.11
    heritage: Helm
    monitoring: 'true'
    release: diracx-cms
  name: diracx-cms-minio
  namespace: default
spec:
  externalTrafficPolicy: Cluster
  internalTrafficPolicy: Cluster
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  ports:
  - name: http
    nodePort: 32000
    port: 9000
    protocol: TCP
    targetPort: 9000
  selector:
    app: minio
    release: diracx-cms
  sessionAffinity: None
  type: NodePort
