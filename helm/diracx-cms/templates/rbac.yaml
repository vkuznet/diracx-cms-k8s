{{- $name := include "diracx-cms.name" . }}
{{- $ns   := .Values.global.namespace }}
---
# Role: init-secrets job needs create/patch on secrets
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $name }}-init-secrets
  namespace: {{ $ns }}
  labels:
    {{ include "diracx-cms.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $name }}-init-secrets
  namespace: {{ $ns }}
  labels:
    {{ include "diracx-cms.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $name }}-init-secrets
subjects:
  - kind: ServiceAccount
    name: {{ $name }}-init-secrets
    namespace: {{ $ns }}
---
# Role: dex needs access to its CRDs
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $name }}-dex
  namespace: {{ $ns }}
  labels:
    {{ include "diracx-cms.labels" . | nindent 4 }}
rules:
  - apiGroups: ["dex.coreos.com"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $name }}-dex
  namespace: {{ $ns }}
  labels:
    {{ include "diracx-cms.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $name }}-dex
subjects:
  - kind: ServiceAccount
    name: {{ $name }}-dex
    namespace: {{ $ns }}
---
# Role: cert-manager issuer job
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $name }}-cert-manager-issuer
  namespace: {{ $ns }}
  labels:
    {{ include "diracx-cms.labels" . | nindent 4 }}
rules:
  - apiGroups: ["cert-manager.io"]
    resources: ["issuers", "certificates"]
    verbs: ["get", "list", "update", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $name }}-cert-manager-issuer
  namespace: {{ $ns }}
  labels:
    {{ include "diracx-cms.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $name }}-cert-manager-issuer
subjects:
  - kind: ServiceAccount
    name: {{ $name }}-cert-manager-issuer
    namespace: {{ $ns }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}-cert-manager-issuer
  namespace: {{ $ns }}
  labels:
    {{ include "diracx-cms.labels" . | nindent 4 }}
