{{- $name := include "diracx-cms.name" . }}
{{- $ns   := .Values.global.namespace }}
---
# Production entrypoint – no pip install -e (pre-built images)
apiVersion: v1
kind: ConfigMap
metadata:
  name: diracx-container-entrypoint
  namespace: {{ $ns }}
  labels:
    {{ include "diracx-cms.labels" . | nindent 4 }}
data:
  entrypoint.sh: |
    #!/bin/bash
    set -euo pipefail
    IFS=$'\n\t'
    ulimit -n 8192
    if [ -f "/activate.sh" ]; then
      source /activate.sh
    else
      eval "$(micromamba shell hook --shell=posix)" && micromamba activate base
    fi
    exec "$@"
---
# init-sql script
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}-init-sql
  namespace: {{ $ns }}
  labels:
    {{ include "diracx-cms.labels" . | nindent 4 }}
data:
  init-sql: |
    #!/usr/bin/env bash
    set -euo pipefail
    python -m diracx.db init-sql
---
# init-os script
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}-init-os
  namespace: {{ $ns }}
  labels:
    {{ include "diracx-cms.labels" . | nindent 4 }}
data:
  init-os: |
    #!/usr/bin/env bash
    set -euo pipefail
    python -m diracx.db init-os
---
# init-cs script
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}-init-cs
  namespace: {{ $ns }}
  labels:
    {{ include "diracx-cms.labels" . | nindent 4 }}
data:
  init-cs: |
    #!/usr/bin/env bash
    set -euo pipefail

    # 1. Activate the environment
    source /activate.sh

    # 2. Add diracx code from PVC to PYTHONPATH
    export PYTHONPATH=${PYTHONPATH:+$PYTHONPATH:}:/src/diracx-logic/src:/src/diracx-core/src

    # Optional debug (very useful)
    echo "PYTHONPATH=$PYTHONPATH"
    ls -l /src || true

    # 3. Initialize the Configuration Service
    echo "Initializing Configuration Service in /cs_store..."

    CS_DIR=/cs_store/initialRepo

    if [[ -d "$CS_DIR" ]]; then
      echo "Configuration Service already exists at $CS_DIR, skipping."
    else
      echo "Creating Configuration Service at $CS_DIR..."
      dirac internal generate-cs "$CS_DIR"
    fi

    echo "CS initialization complete."
---
# init-secrets script
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}-init-secrets
  namespace: {{ $ns }}
  labels:
    {{ include "diracx-cms.labels" . | nindent 4 }}
data:
  init-secrets: |
    #!/usr/bin/env bash
    NAMESPACE="{{ $ns }}"
    MYSQL_HOST="{{ include "diracx-cms.mysqlHost" . }}"
    MYSQL_APP_USER="{{ (.Values.mysql.enabled | ternary .Values.mysql.appUser .Values.external.mysql.appUser) }}"
    MYSQL_SECRET_NAME="mysql-secret"
    OS_HOST="{{ include "diracx-cms.osHost" . }}"
    OS_USER="{{ (.Values.opensearch.enabled | ternary .Values.opensearch.user .Values.external.opensearch.user) }}"
    OS_PASSWORD="{{ (.Values.opensearch.enabled | ternary .Values.opensearch.password .Values.external.opensearch.password) }}"
    OS_ROOT_USER="${OS_USER}"
    OS_ROOT_PASSWORD="${OS_PASSWORD}"
    SQL_DBS=({{ range .Values.diracx.sqlDbs }}{{ . }} {{ end }})
    OS_DBS=({{ range .Values.diracx.osDbs }}{{ . }} {{ end }})
    set -euo pipefail
    pushd "$(mktemp -d)"
    function gen_random() { head -c 4096 /dev/urandom | LC_CTYPE=C tr -cd "$1" | head -c "$2"; }
    function generate_secret_if_needed() {
      local secret_name=$1; local secret_args=("${@:2}")
      if ! kubectl --namespace="$NAMESPACE" get secret "$secret_name" >/dev/null 2>&1; then
        echo "Creating secret \"${secret_name}\"..."
        kubectl --namespace="$NAMESPACE" create secret generic "$secret_name" "${secret_args[@]}"
      else
        echo "Secret \"${secret_name}\" exists – checking for missing keys..."
        for arg in "${secret_args[@]}"; do
          local from; from=$(echo -n "${arg}" | cut -d'=' -f1)
          [[ "${from}" != *"literal"* ]] && continue
          local key; key=$(echo -n "${arg}" | cut -d'=' -f2)
          local val; val=$(echo -n "${arg}" | cut -d'=' -f3-)
          if ! kubectl --namespace="$NAMESPACE" get secret "$secret_name" \
               -o jsonpath="{.data.${key}}" >/dev/null 2>&1; then
            echo "  Patching missing key \"${key}\"..."
            local enc=""; [[ -n "${val}" ]] && enc=$(echo -n "${val}" | base64 -w 0)
            kubectl --namespace="$NAMESPACE" patch secret "${secret_name}" \
              -p "{\"data\":{\"${key}\":\"${enc}\"}}"
          fi
        done
      fi
    }
    echo "==> diracx-dynamic-secrets"
    generate_secret_if_needed diracx-dynamic-secrets \
      --from-literal=DIRACX_SERVICE_AUTH_STATE_KEY="$(head -c 32 /dev/urandom | base64)"
    {{- if .Values.mysql.enabled }}
    echo "==> ${MYSQL_SECRET_NAME}"
    generate_secret_if_needed "${MYSQL_SECRET_NAME}" \
      --from-literal=mysql-root-password="$(gen_random 'a-zA-Z0-9' 32)" \
      --from-literal=mysql-replication-password="$(gen_random 'a-zA-Z0-9' 32)" \
      --from-literal=mysql-password="$(gen_random 'a-zA-Z0-9' 32)"
    MYSQL_APP_PASSWORD=$(kubectl get secret "${MYSQL_SECRET_NAME}" \
      --namespace="$NAMESPACE" -o jsonpath="{.data.mysql-password}" | base64 -d)
    MYSQL_ROOT_PASSWORD=$(kubectl get secret "${MYSQL_SECRET_NAME}" \
      --namespace="$NAMESPACE" -o jsonpath="{.data.mysql-root-password}" | base64 -d)
    {{- else }}
    MYSQL_APP_PASSWORD="{{ .Values.external.mysql.appPassword }}"
    MYSQL_ROOT_PASSWORD="{{ .Values.external.mysql.rootPassword }}"
    {{- end }}
    echo "==> SQL connection URLs"
    for DB in "${SQL_DBS[@]}"; do
      DB_UPPER=$(echo "${DB}" | tr '[:lower:]' '[:upper:]')
      generate_secret_if_needed diracx-sql-connection-urls \
        --from-literal="DIRACX_DB_URL_${DB_UPPER}=mysql+aiomysql://${MYSQL_APP_USER}:${MYSQL_APP_PASSWORD}@${MYSQL_HOST}/${DB}"
      generate_secret_if_needed diracx-sql-root-connection-urls \
        --from-literal="DIRACX_DB_URL_${DB_UPPER}=mysql+aiomysql://root:${MYSQL_ROOT_PASSWORD}@${MYSQL_HOST}/${DB}"
    done
    echo "==> OpenSearch connection URLs"
    for OSDB in "${OS_DBS[@]}"; do
      OSDB_UPPER=$(echo "${OSDB}" | tr '[:lower:]' '[:upper:]')
      generate_secret_if_needed diracx-os-connection-urls \
        --from-literal="DIRACX_OS_DB_${OSDB_UPPER}={\"hosts\": \"${OS_USER}:${OS_PASSWORD}@${OS_HOST}\", \"use_ssl\": true, \"verify_certs\": false}"
      generate_secret_if_needed diracx-os-root-connection-urls \
        --from-literal="DIRACX_OS_DB_${OSDB_UPPER}={\"hosts\": \"${OS_ROOT_USER}:${OS_ROOT_PASSWORD}@${OS_HOST}\", \"use_ssl\": true, \"verify_certs\": false}"
    done
    echo "==> Done."
    popd
---
apiVersion: v1
data:
  init-diracx-dbs.sql: 'CREATE DATABASE IF NOT EXISTS `AuthDB`;
    GRANT ALL PRIVILEGES ON AuthDB.* TO ''diracx''@''%'';

    CREATE DATABASE IF NOT EXISTS `JobDB`;
    GRANT ALL PRIVILEGES ON JobDB.* TO ''diracx''@''%'';

    CREATE DATABASE IF NOT EXISTS `JobLoggingDB`;
    GRANT ALL PRIVILEGES ON JobLoggingDB.* TO ''diracx''@''%'';

    CREATE DATABASE IF NOT EXISTS `PilotAgentsDB`;
    GRANT ALL PRIVILEGES ON PilotAgentsDB.* TO ''diracx''@''%'';

    CREATE DATABASE IF NOT EXISTS `SandboxMetadataDB`;
    GRANT ALL PRIVILEGES ON SandboxMetadataDB.* TO ''diracx''@''%'';

    CREATE DATABASE IF NOT EXISTS `TaskQueueDB`;
    GRANT ALL PRIVILEGES ON TaskQueueDB.* TO ''diracx''@''%'';

    FLUSH PRIVILEGES;

    '
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/managed-by: Helm
  name: mysql-init-diracx-dbs
  namespace: {{ $ns }}
---
apiVersion: v1
data:
  opensearch.yml: "cluster.name: opensearch-cluster\n\n# Bind to all interfaces because\
    \ we don't know what IP address Docker will assign to us.\nnetwork.host: 0.0.0.0\n\
    \n# Setting network.host to a non-loopback address enables the annoying bootstrap\
    \ checks. \"Single-node\" mode disables them again.\n# Implicitly done if \".singleNode\"\
    \ is set to \"true\".\n# discovery.type: single-node\n\n# Start OpenSearch Security\
    \ Demo Configuration\n# WARNING: revise all the lines below before you go into\
    \ production\nplugins:\n  security:\n    ssl:\n      transport:\n        pemcert_filepath:\
    \ esnode.pem\n        pemkey_filepath: esnode-key.pem\n        pemtrustedcas_filepath:\
    \ root-ca.pem\n        enforce_hostname_verification: false\n      http:\n   \
    \     enabled: true\n        pemcert_filepath: esnode.pem\n        pemkey_filepath:\
    \ esnode-key.pem\n        pemtrustedcas_filepath: root-ca.pem\n    allow_unsafe_democertificates:\
    \ true\n    allow_default_init_securityindex: true\n    authcz:\n      admin_dn:\n\
    \        - CN=kirk,OU=client,O=client,L=test,C=de\n    audit.type: internal_opensearch\n\
    \    enable_snapshot_restore_privilege: true\n    check_snapshot_restore_write_privileges:\
    \ true\n    restapi:\n      roles_enabled: [\"all_access\", \"security_rest_api_access\"\
    ]\n    system_indices:\n      enabled: true\n      indices:\n        [\n     \
    \     \".opendistro-alerting-config\",\n          \".opendistro-alerting-alert*\"\
    ,\n          \".opendistro-anomaly-results*\",\n          \".opendistro-anomaly-detector*\"\
    ,\n          \".opendistro-anomaly-checkpoints\",\n          \".opendistro-anomaly-detection-state\"\
    ,\n          \".opendistro-reports-*\",\n          \".opendistro-notifications-*\"\
    ,\n          \".opendistro-notebooks\",\n          \".opendistro-asynchronous-search-response*\"\
    ,\n        ]\n######## End OpenSearch Security Demo Configuration ########\ncluster:\n\
    \  routing:\n    allocation:\n      disk:\n        threshold_enabled: \"true\"\
    \n        watermark:\n          flood_stage: 200mb\n          low: 500mb\n   \
    \       high: 300mb\n"
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/component: opensearch-cluster-master
    app.kubernetes.io/instance: diracx-cms
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/version: 2.8.0
    helm.sh/chart: opensearch-2.13.1
  name: opensearch-cluster-master-config
  namespace: {{ $ns }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: diracx-cms-init-keystore
  namespace: {{ $ns }}
data:
  init-keystore: |
    #!/usr/bin/env bash
    set -euo pipefail
    source /activate.sh

    # POINT PYTHON TO THE MOUNTED SOURCE
    export PYTHONPATH=${PYTHONPATH:-}:/src/diracx-logic/src:/src/diracx-core/src

    mkdir -p /keystore
    KEYSTORE_PATH=/keystore/jwks.json

    if [[ -f $KEYSTORE_PATH ]]; then
        echo "JWKS already exists, skipping."
        exit 0
    fi

    python -m diracx.logic rotate-jwk --jwks-path $KEYSTORE_PATH

  load-keystore-as-secret: |
    #!/usr/bin/env bash
    set -euo pipefail

    KEYSTORE_PATH=/keystore/jwks.json

    if kubectl get secret diracx-jwks >/dev/null 2>&1; then
      echo "diracx-jwks already present, skipping."
      exit 0
    fi

    kubectl create secret generic diracx-jwks --from-file=jwks.json=$KEYSTORE_PATH
