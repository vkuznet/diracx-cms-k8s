{{- $name := include "diracx-cms.name" . }}
{{- $ns   := .Values.global.namespace }}
{{- $mysqlHost := include "diracx-cms.mysqlHost" . }}
{{- $osHost    := include "diracx-cms.osHost" . }}

# ── init-secrets ──────────────────────────────────────────────────────────────
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $name }}-init-secrets
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/component: init-secrets
    {{ include "diracx-cms.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  {{ include "diracx-cms.jobSpec" . | nindent 2 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: init-secrets
        {{ include "diracx-cms.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ $name }}-init-secrets
      containers:
        - name: diracx
          image: ghcr.io/diracgrid/diracx/secret-generation:latest
          imagePullPolicy: Always
          command: ["/bin/bash", "/scripts/init-secrets"]
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: {{ $name }}-init-secrets
            defaultMode: 0755

# ── init-sql ──────────────────────────────────────────────────────────────────
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $name }}-init-sql
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/component: init-sql
    {{ include "diracx-cms.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "2"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  {{ include "diracx-cms.jobSpec" . | nindent 2 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: init-sql
        {{ include "diracx-cms.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-mysql
          image: docker.io/library/busybox:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: MYSQL_HOST
              value: {{ $mysqlHost | replace ":3306" "" | quote }}
          command: ["sh","-c","until nc -z ${MYSQL_HOST} 3306; do echo waiting; sleep 3; done"]
      containers:
        - name: diracx
          image: {{ .Values.images.services }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command: ["/bin/bash", "/entrypoint.sh"]
          args: ["/bin/bash", "/scripts/init-sql"]
          env:
          {{- range .Values.diracx.sqlDbs }}
            - name: DIRACX_DB_URL_{{ . | upper }}
              valueFrom:
                secretKeyRef:
                  name: diracx-sql-root-connection-urls
                  key: DIRACX_DB_URL_{{ . | upper }}
          {{- end }}
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: container-entrypoint
              mountPath: /entrypoint.sh
              subPath: entrypoint.sh
      volumes:
        - name: scripts
          configMap:
            name: {{ $name }}-init-sql
            defaultMode: 0755
        - name: container-entrypoint
          configMap:
            name: diracx-container-entrypoint
            defaultMode: 0755

# ── init-os ───────────────────────────────────────────────────────────────────
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $name }}-init-os
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/component: init-os
    {{ include "diracx-cms.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "3"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  {{ include "diracx-cms.jobSpec" . | nindent 2 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: init-os
        {{ include "diracx-cms.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-opensearch
          image: docker.io/library/busybox:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: OS_HOST
              value: {{ $osHost | replace ":9200" "" | quote }}
          command: ["sh","-c","until nc -z ${OS_HOST} 9200; do echo waiting; sleep 3; done"]
      containers:
        - name: diracx
          image: {{ .Values.images.services }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command: ["/bin/bash", "/entrypoint.sh"]
          args: ["/bin/bash", "/scripts/init-os"]
          env:
          {{- range .Values.diracx.osDbs }}
            - name: DIRACX_OS_DB_{{ . | upper }}
              valueFrom:
                secretKeyRef:
                  name: diracx-os-root-connection-urls
                  key: DIRACX_OS_DB_{{ . | upper }}
          {{- end }}
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: container-entrypoint
              mountPath: /entrypoint.sh
              subPath: entrypoint.sh
      volumes:
        - name: scripts
          configMap:
            name: {{ $name }}-init-os
            defaultMode: 0755
        - name: container-entrypoint
          configMap:
            name: diracx-container-entrypoint
            defaultMode: 0755

# ── init-keystore ─────────────────────────────────────────────────────────────
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $name }}-init-keystore
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/component: init-keystore
    {{ include "diracx-cms.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "4"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  {{ include "diracx-cms.jobSpec" . | nindent 2 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: init-keystore
        {{ include "diracx-cms.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ $name }}-init-secrets
      initContainers:
        - name: diracx-init-keystore
          image: {{ .Values.images.services }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command: ["/bin/bash", "/entrypoint.sh"]
          args: ["/bin/bash", "/scripts/init-keystore"]
          volumeMounts:
            - name: keystore
              mountPath: /keystore
            - name: scripts
              mountPath: /scripts
            - name: diracx-src
              mountPath: /src
            - name: container-entrypoint
              mountPath: /entrypoint.sh
              subPath: entrypoint.sh
      containers:
        - name: diracx
          image: ghcr.io/diracgrid/diracx/secret-generation:latest
          imagePullPolicy: Always
          command: ["/bin/bash", "/scripts/load-keystore-as-secret"]
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: keystore
              mountPath: /keystore
      volumes:
        - name: keystore
          emptyDir: {}
        - name: scripts
          configMap:
            name: {{ $name }}-init-keystore
            defaultMode: 0755
        - name: container-entrypoint
          configMap:
            name: diracx-container-entrypoint
            defaultMode: 0755
        - name: diracx-src
          persistentVolumeClaim:
            claimName: pvc-diracx-code

# ── init-cs (configuration store) ────────────────────────────────────────────
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $name }}-init-cs
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/component: init-cs
    {{ include "diracx-cms.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  {{ include "diracx-cms.jobSpec" . | nindent 2 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: init-cs
        {{ include "diracx-cms.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      containers:
        - name: diracx
          image: {{ .Values.images.client }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command: ["/bin/bash", "/entrypoint.sh"]
          args: ["/bin/bash", "/scripts/init-cs"]
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: cs-store-mount
              mountPath: /cs_store
            - name: container-entrypoint
              mountPath: /entrypoint.sh
              subPath: entrypoint.sh
      volumes:
        - name: scripts
          configMap:
            name: {{ $name }}-init-cs
            defaultMode: 0755
        - name: cs-store-mount
          persistentVolumeClaim:
            claimName: pvc-cs-store
        - name: container-entrypoint
          configMap:
            name: diracx-container-entrypoint
            defaultMode: 0755
