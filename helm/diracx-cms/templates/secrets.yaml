{{- $name := include "diracx-cms.name" . }}
{{- $ns   := .Values.global.namespace }}
{{- $host := .Values.global.hostname }}
{{- $pubUrl := include "diracx-cms.publicUrl" . }}
{{- $minioEp := include "diracx-cms.minioEndpoint" . }}
{{- $mysqlHost := include "diracx-cms.mysqlHost" . }}
{{- $osHost := include "diracx-cms.osHost" . }}

{{/* ── Dex config secret ────────────────────────────────────────────────── */}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}-dex
  namespace: {{ $ns }}
  labels:
    {{ include "diracx-cms.labels" . | nindent 4 }}
type: Opaque
stringData:
  config.yaml: |
    enablePasswordDB: true
    expiry:
      authRequests: 24h
      deviceRequests: 5m
      idTokens: 24h
      signingKeys: 6h
    issuer: {{ include "diracx-cms.dexIssuer" . }}
    logger:
      format: text
      level: debug
    oauth2:
      alwaysShowLoginScreen: false
      responseTypes:
        - code
      skipApprovalScreen: false
    staticClients:
      {{- range .Values.dex.staticClients }}
      - id: {{ .id }}
        name: {{ .name }}
        public: {{ .public }}
        redirectURIs:
          - {{ $pubUrl }}/api/auth/device/complete
          - {{ $pubUrl }}/api/auth/authorize/complete
      {{- end }}
    staticPasswords:
      {{- range .Values.dex.staticPasswords }}
      - email: {{ .email }}
        hash: {{ .hash }}
        userID: {{ .userID }}
        username: {{ .username }}
      {{- end }}
    storage:
      config:
        file: /tmp/dex.db
      type: sqlite3
    web:
      http: 8000

{{/* ── MinIO credentials ────────────────────────────────────────────────── */}}
{{- if .Values.minio.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}-minio
  namespace: {{ $ns }}
  labels:
    {{ include "diracx-cms.labels" . | nindent 4 }}
type: Opaque
stringData:
  rootUser: {{ .Values.minio.rootUser | quote }}
  rootPassword: {{ .Values.minio.rootPassword | quote }}
{{- end }}

{{/* ── MySQL password secret (only when bundled) ───────────────────────── */}}
{{- if .Values.mysql.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: {{ $ns }}
  labels:
    {{ include "diracx-cms.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Passwords are left empty here so the init-secrets job generates strong
  # random values on first install (idempotent: never overwrites existing).
  # Pre-set only when you need a deterministic password (e.g. restoring a DB).
  mysql-root-password: {{ .Values.mysql.rootPassword | default "" | quote }}
  mysql-password: {{ .Values.mysql.appPassword | default "" | quote }}
  mysql-replication-password: {{ .Values.mysql.replicationPassword | default "" | quote }}
{{- end }}

{{/* ── DiracX runtime secrets ───────────────────────────────────────────── */}}
---
apiVersion: v1
kind: Secret
metadata:
  name: diracx-secrets
  namespace: {{ $ns }}
  labels:
    {{ include "diracx-cms.labels" . | nindent 4 }}
type: Opaque
stringData:
  DIRACX_CONFIG_BACKEND_URL: "git+file:///cs_store/initialRepo"
  DIRACX_OTEL_ENABLED: {{ .Values.diracx.otelEnabled | quote }}
  DIRACX_OTEL_GRPC_INSECURE: {{ .Values.diracx.otelGrpcInsecure | quote }}
  DIRACX_SANDBOX_STORE_AUTO_CREATE_BUCKET: {{ .Values.diracx.sandboxAutoCreateBucket | quote }}
  DIRACX_SANDBOX_STORE_BUCKET_NAME: {{ .Values.diracx.sandboxBucketName | quote }}
  DIRACX_SANDBOX_STORE_S3_CLIENT_KWARGS: |
    {"endpoint_url": {{ $minioEp | quote }}, "aws_access_key_id": {{ ((.Values.minio.enabled | ternary .Values.minio.accessKeyId .Values.external.minio.accessKeyId) | default "") | quote }}, "aws_secret_access_key": {{ ((.Values.minio.enabled | ternary .Values.minio.secretAccessKey .Values.external.minio.secretAccessKey) | default "") | quote }}}
  DIRACX_SERVICE_AUTH_ACCESS_TOKEN_EXPIRE_MINUTES: {{ .Values.diracx.authAccessTokenExpireMinutes | quote }}
  DIRACX_SERVICE_AUTH_ALLOWED_REDIRECTS: |
    ["{{ $pubUrl }}/api/docs/oauth2-redirect", "{{ $pubUrl }}/#authentication-callback"]
  DIRACX_SERVICE_AUTH_REFRESH_TOKEN_EXPIRE_MINUTES: {{ .Values.diracx.authRefreshTokenExpireMinutes | quote }}
  DIRACX_SERVICE_AUTH_TOKEN_ISSUER: {{ $pubUrl | quote }}
  DIRACX_SERVICE_AUTH_TOKEN_KEYSTORE: "file:///keystore/jwks.json"

{{/* ── SQL connection URLs ──────────────────────────────────────────────── */}}
---
apiVersion: v1
kind: Secret
metadata:
  name: diracx-sql-connection-urls
  namespace: {{ $ns }}
  labels:
    {{ include "diracx-cms.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- $appUser := (.Values.mysql.enabled | ternary .Values.mysql.appUser .Values.external.mysql.appUser) }}
  {{- $appPass := (.Values.mysql.enabled | ternary "" .Values.external.mysql.appPassword) }}
  {{- range .Values.diracx.sqlDbs }}
  DIRACX_DB_URL_{{ . | upper }}: "mysql+aiomysql://{{ $appUser }}:{{ $appPass }}@{{ $mysqlHost }}/{{ . }}"
  {{- end }}

---
apiVersion: v1
kind: Secret
metadata:
  name: diracx-sql-root-connection-urls
  namespace: {{ $ns }}
  labels:
    {{ include "diracx-cms.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- $rootUser := (.Values.mysql.enabled | ternary "root" .Values.external.mysql.rootUser) }}
  {{- $rootPass := (.Values.mysql.enabled | ternary "" .Values.external.mysql.rootPassword) }}
  {{- range .Values.diracx.sqlDbs }}
  DIRACX_DB_URL_{{ . | upper }}: "mysql+aiomysql://{{ $rootUser }}:{{ $rootPass }}@{{ $mysqlHost }}/{{ . }}"
  {{- end }}

{{/* ── OpenSearch connection URLs ──────────────────────────────────────── */}}
---
apiVersion: v1
kind: Secret
metadata:
  name: diracx-os-connection-urls
  namespace: {{ $ns }}
  labels:
    {{ include "diracx-cms.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- $osUser := (.Values.opensearch.enabled | ternary .Values.opensearch.user .Values.external.opensearch.user) }}
  {{- $osPass := (.Values.opensearch.enabled | ternary .Values.opensearch.password .Values.external.opensearch.password) }}
  {{- range .Values.diracx.osDbs }}
  DIRACX_OS_DB_{{ . | upper }}: '{"hosts": "{{ $osUser }}:{{ $osPass }}@{{ $osHost }}", "use_ssl": true, "verify_certs": false}'
  {{- end }}

---
apiVersion: v1
kind: Secret
metadata:
  name: diracx-os-root-connection-urls
  namespace: {{ $ns }}
  labels:
    {{ include "diracx-cms.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- $osRootUser := (.Values.opensearch.enabled | ternary .Values.opensearch.user .Values.external.opensearch.user) }}
  {{- $osRootPass := (.Values.opensearch.enabled | ternary .Values.opensearch.password .Values.external.opensearch.password) }}
  {{- range .Values.diracx.osDbs }}
  DIRACX_OS_DB_{{ . | upper }}: '{"hosts": "{{ $osRootUser }}:{{ $osRootPass }}@{{ $osHost }}", "use_ssl": true, "verify_certs": false}'
  {{- end }}
