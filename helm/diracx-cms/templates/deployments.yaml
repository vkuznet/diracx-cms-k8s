{{- $name := include "diracx-cms.name" . }}
{{- $ns   := .Values.global.namespace }}
{{- $host := .Values.global.hostname }}
{{- $pubUrl := include "diracx-cms.publicUrl" . }}
{{- $mysqlHost := include "diracx-cms.mysqlHost" . }}
{{- $osHost   := include "diracx-cms.osHost" . }}

# ── DiracX API ────────────────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: diracx
    app.kubernetes.io/instance: {{ $name }}
    {{ include "diracx-cms.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.diracx.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: diracx
      app.kubernetes.io/instance: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: diracx
        app.kubernetes.io/instance: {{ $name }}
    spec:
      #serviceAccountName: {{ $name }}
      serviceAccountName: {{ $name }}-init-secrets
      initContainers:
        # init-secrets
        - name: init-secrets
          image: ghcr.io/diracgrid/diracx/secret-generation:latest
          imagePullPolicy: Always
          command: ["/bin/bash", "/scripts/init-secrets"]
          volumeMounts:
            - name: scripts-init-secrets
              mountPath: /scripts
        # init-cs
        - name: init-cs
          image: {{ .Values.images.client }}
          command: ["/bin/bash", "/entrypoint.sh"]
          args: ["/bin/bash", "/scripts/init-cs"]
          volumeMounts:
            - name: scripts-init-cs
              mountPath: /scripts
            - name: cs-store-mount
              mountPath: /cs_store
            - name: container-entrypoint
              mountPath: /entrypoint.sh
              subPath: entrypoint.sh
        # init-keystore
        - name: init-keystore
          image: {{ .Values.images.services }}
          command: ["/bin/bash", "/entrypoint.sh"]
          args: ["/bin/bash", "/scripts/init-keystore"]
          volumeMounts:
            - name: keystore-tmp
              mountPath: /keystore
            - name: scripts-init-keystore
              mountPath: /scripts
            - name: diracx-src
              mountPath: /src
            - name: container-entrypoint
              mountPath: /entrypoint.sh
              subPath: entrypoint.sh
        - name: load-keystore
          image: ghcr.io/diracgrid/diracx/secret-generation:latest
          command: ["/bin/bash", "/scripts/load-keystore-as-secret"]
          volumeMounts:
            - name: keystore-tmp
              mountPath: /keystore
            - name: scripts-init-keystore
              mountPath: /scripts
        - name: wait-for-mysql
          image: docker.io/library/busybox:latest
          imagePullPolicy: IfNotPresent
          command: ["sh","-c","until nc -z diracx-cms-mysql 3306; do echo 'Waiting for mysql...'; sleep 3; done;"]
        - name: wait-for-opensearch
          image: docker.io/library/busybox:latest
          imagePullPolicy: IfNotPresent
          command: ["sh","-c","until nc -z {{ $osHost | replace ":9200" "" }} 9200; do echo 'Waiting for opensearch...'; sleep 3; done;"]
        {{- if .Values.minio.enabled }}
        - name: wait-for-minio
          image: docker.io/library/busybox:latest
          imagePullPolicy: IfNotPresent
          command: ["sh","-c","until echo -e \"HEAD /minio/health/live HTTP/1.1\\nHost: {{ $name }}-minio\\nConnection: close\\n\" | nc {{ $name }}-minio:9000 | grep \"HTTP/1.1 200 OK\"; do echo 'Waiting for minio...'; sleep 3; done;"]
        {{- end }}
        # init-sql
        - name: init-sql
          image: {{ .Values.images.services }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command: ["/bin/bash", "/entrypoint.sh"]
          args: ["/bin/bash", "/scripts/init-sql"]
          env:
          {{- range .Values.diracx.sqlDbs }}
            - name: DIRACX_DB_URL_{{ . | upper }}
              valueFrom:
                secretKeyRef:
                  name: diracx-sql-root-connection-urls
                  key: DIRACX_DB_URL_{{ . | upper }}
          {{- end }}
          volumeMounts:
            - name: scripts-init-sql
              mountPath: /scripts
            - name: container-entrypoint
              mountPath: /entrypoint.sh
              subPath: entrypoint.sh
      containers:
        - name: diracx
          image: {{ .Values.images.services }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command:
            - /usr/local/bin/_entrypoint.sh
            - tini
            - --
            - bash
            - /entrypoint.sh
          args:
            - uvicorn
            - --factory
            - diracx.routers:create_app
            - --host=0.0.0.0
            - --port=8000
            - --proxy-headers
            - --forwarded-allow-ips=*
          ports:
            - name: http
              containerPort: 8000
          startupProbe:
            httpGet:
              path: /api/health/startup
              port: http
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: http
            failureThreshold: 3
            periodSeconds: 20
            timeoutSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: http
            failureThreshold: 3
            periodSeconds: 20
            timeoutSeconds: 15
          envFrom:
            - secretRef:
                name: diracx-secrets
            - secretRef:
                name: diracx-dynamic-secrets
            - secretRef:
                name: diracx-sql-connection-urls
            - secretRef:
                name: diracx-os-connection-urls
          volumeMounts:
            - name: cs-store-mount
              mountPath: /cs_store
            - name: container-entrypoint
              mountPath: /entrypoint.sh
              subPath: entrypoint.sh
            - name: jwks-mount
              mountPath: /keystore
            - name: diracx-src
              mountPath: /src
      volumes:
        - name: cs-store-mount
          persistentVolumeClaim:
            claimName: pvc-cs-store
        - name: container-entrypoint
          configMap:
            name: diracx-container-entrypoint
            defaultMode: 0755
        - name: jwks-mount
          secret:
            secretName: diracx-jwks
            items:
              - key: jwks.json
                path: jwks.json
        - name: diracx-src
          persistentVolumeClaim:
            claimName: pvc-diracx-code
        - name: scripts-init-secrets
          configMap:
            name: {{ $name }}-init-secrets
            defaultMode: 0755
        - name: scripts-init-cs
          configMap:
            name: {{ $name }}-init-cs
            defaultMode: 0755
        - name: scripts-init-keystore
          configMap:
            name: {{ $name }}-init-keystore
            defaultMode: 0755
        - name: scripts-init-sql
          configMap:
            name: {{ $name }}-init-sql
            defaultMode: 0755
        - name: keystore-tmp
          emptyDir: {}

# ── DiracX Web UI ─────────────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}-web
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: diracx-web
    app.kubernetes.io/instance: {{ $name }}
    {{ include "diracx-cms.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: diracx-web
      app.kubernetes.io/instance: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: diracx-web
        app.kubernetes.io/instance: {{ $name }}
    spec:
      containers:
        - name: diracx-web
          image: {{ .Values.images.web }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080

# ── DiracX CLI (always-on shell pod) ─────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}-cli
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: diracx-cli
    app.kubernetes.io/instance: {{ $name }}
    {{ include "diracx-cms.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: diracx-cli
      app.kubernetes.io/instance: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: diracx-cli
        app.kubernetes.io/instance: {{ $name }}
    spec:
      containers:
        - name: diracx-cli
          image: {{ .Values.images.client }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command: ["sleep", "infinity"]
          env:
            - name: DIRACX_URL
              value: {{ $pubUrl | quote }}
            - name: DIRACX_CA_PATH
              value: /ca/demo-ca.pem
          volumeMounts:
            - name: cs-store-mount
              mountPath: /cs_store
            - name: ca-mount
              mountPath: /ca
            - name: container-entrypoint
              mountPath: /entrypoint.sh
              subPath: entrypoint.sh
      volumes:
        - name: cs-store-mount
          persistentVolumeClaim:
            claimName: pvc-cs-store
        - name: ca-mount
          secret:
            secretName: {{ .Values.certManager.caSecretName }}
        - name: container-entrypoint
          configMap:
            name: diracx-container-entrypoint
            defaultMode: 0755

# ── Dex ───────────────────────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}-dex
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: dex
    app.kubernetes.io/instance: {{ $name }}
    {{ include "diracx-cms.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.dex.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: dex
      app.kubernetes.io/instance: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dex
        app.kubernetes.io/instance: {{ $name }}
    spec:
      serviceAccountName: {{ $name }}-dex
      containers:
        - name: dex
          image: {{ .Values.images.dex }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command: ["/usr/local/bin/dex", "serve", "/etc/dex/config.yaml"]
          ports:
            - name: http
              containerPort: 8000
            - name: telemetry
              containerPort: 5558
          volumeMounts:
            - name: config
              mountPath: /etc/dex
      volumes:
        - name: config
          secret:
            secretName: {{ $name }}-dex

# ── MinIO ─────────────────────────────────────────────────────────────────────
{{- if .Values.minio.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}-minio
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/instance: {{ $name }}
    {{ include "diracx-cms.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
      app.kubernetes.io/instance: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
        app.kubernetes.io/instance: {{ $name }}
    spec:
      containers:
        - name: minio
          image: {{ .Values.images.minio }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command: ["/bin/sh", "-ce",
            "/usr/bin/docker-entrypoint.sh minio server /export -S /etc/minio/certs/ --address :9000 --console-address :9001"]
          env:
            - name: MINIO_PROMETHEUS_AUTH_TYPE
              value: public
            - name: MINIO_BROWSER_REDIRECT_URL
              value: "http://{{ $host }}:{{ .Values.minio.consoleNodePort }}"
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $name }}-minio
                  key: rootUser
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $name }}-minio
                  key: rootPassword
          ports:
            - name: http
              containerPort: 9000
            - name: console
              containerPort: 9001
          volumeMounts:
            - name: export
              mountPath: /export
      volumes:
        - name: export
          persistentVolumeClaim:
            claimName: {{ $name }}-minio
{{- end }}
